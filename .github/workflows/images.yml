name: Build And Publish Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build And Push Images
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive image names
        id: vars
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "backend=ghcr.io/${OWNER_LC}/${REPO_LC}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${OWNER_LC}/${REPO_LC}-frontend" >> "$GITHUB_OUTPUT"
          echo "importer=ghcr.io/${OWNER_LC}/${REPO_LC}-importer" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.backend }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build And Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./texinroistot-server
          file: ./texinroistot-server/Dockerfile.prod
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.frontend }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build And Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./texinroistot-ui
          file: ./texinroistot-ui/Dockerfile.prod
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Importer image metadata
        id: importer-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.importer }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build And Push Importer
        uses: docker/build-push-action@v6
        with:
          context: ./texinroistot-server
          file: ./texinroistot-server/Dockerfile.importer
          push: true
          tags: ${{ steps.importer-meta.outputs.tags }}
          labels: ${{ steps.importer-meta.outputs.labels }}
          cache-from: type=gha,scope=importer
          cache-to: type=gha,mode=max,scope=importer

  retag-release:
    name: Retag Existing Images For Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Derive image names and release tags
        id: vars
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          RELEASE_TAG="${GITHUB_REF_NAME}"          # v1.2.3
          RELEASE_VERSION="${RELEASE_TAG#v}"        # 1.2.3
          RELEASE_MAJOR="$(echo "${RELEASE_VERSION}" | cut -d. -f1)"
          RELEASE_MINOR="$(echo "${RELEASE_VERSION}" | cut -d. -f1-2)"
          SOURCE_SHA_TAG="sha-${GITHUB_SHA}"

          echo "backend=ghcr.io/${OWNER_LC}/${REPO_LC}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${OWNER_LC}/${REPO_LC}-frontend" >> "$GITHUB_OUTPUT"
          echo "importer=ghcr.io/${OWNER_LC}/${REPO_LC}-importer" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_major=${RELEASE_MAJOR}" >> "$GITHUB_OUTPUT"
          echo "release_minor=${RELEASE_MINOR}" >> "$GITHUB_OUTPUT"
          echo "source_sha_tag=${SOURCE_SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag Backend
        run: |
          IMAGE="${{ steps.vars.outputs.backend }}"
          SOURCE_REF="${IMAGE}:${{ steps.vars.outputs.source_sha_tag }}"

          for attempt in $(seq 1 30); do
            if docker buildx imagetools inspect "${SOURCE_REF}" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Source image not found: ${SOURCE_REF}"
              exit 1
            fi
            echo "Waiting for source image ${SOURCE_REF} (attempt ${attempt}/30)..."
            sleep 10
          done

          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_tag }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_version }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_minor }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_major }}" "${SOURCE_REF}"

      - name: Retag Frontend
        run: |
          IMAGE="${{ steps.vars.outputs.frontend }}"
          SOURCE_REF="${IMAGE}:${{ steps.vars.outputs.source_sha_tag }}"

          for attempt in $(seq 1 30); do
            if docker buildx imagetools inspect "${SOURCE_REF}" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Source image not found: ${SOURCE_REF}"
              exit 1
            fi
            echo "Waiting for source image ${SOURCE_REF} (attempt ${attempt}/30)..."
            sleep 10
          done

          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_tag }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_version }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_minor }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_major }}" "${SOURCE_REF}"

      - name: Retag Importer
        run: |
          IMAGE="${{ steps.vars.outputs.importer }}"
          SOURCE_REF="${IMAGE}:${{ steps.vars.outputs.source_sha_tag }}"

          for attempt in $(seq 1 30); do
            if docker buildx imagetools inspect "${SOURCE_REF}" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Source image not found: ${SOURCE_REF}"
              exit 1
            fi
            echo "Waiting for source image ${SOURCE_REF} (attempt ${attempt}/30)..."
            sleep 10
          done

          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_tag }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_version }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_minor }}" "${SOURCE_REF}"
          docker buildx imagetools create --tag "${IMAGE}:${{ steps.vars.outputs.release_major }}" "${SOURCE_REF}"
